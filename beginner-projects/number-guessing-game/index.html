<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="ngg.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>🎯 GUESS THE NUMBER</h1>
    <h2>Pick a number (1 - 100)</h2>
    <input type="number" id="input" min="1" max="100">
    <br>
    <button class="checkGuess">Check Guess</button>
    <p class="response">🤔 Can you find the secret number?</p>
    <p class="attempts">Attempts : <span class="attemptsSpan">0</span></p>
    <button class="reset">New Game</button>
  </div>

  <script src="ngg.js"></script>
</body>
</html>
