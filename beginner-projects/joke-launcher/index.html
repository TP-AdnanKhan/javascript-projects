<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joke Generator</title>
  <link rel="stylesheet" href="jg.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1><p>🎭</p><p>THE JOKE LAUNCHER</p></h1>
    <div class="select">
      <span class="filter all active">All</span>
      <span class="filter programming">Programming</span>
      <span class="filter pun">Pun</span>
      <span class="filter spooky">Spooky</span>
      <span class="filter christmas">Christmas</span>
    </div>
    <p class="joke">"Consulting the comedy Gods..."</p>
    <div class="punchlineBox">
      <p class="reveal">👀 Hover to reveal punchline...</p>
      <p class="punchline hide">...</p>
    </div>
    
    <button class="reset">🔄 Get Another Laugh</button>

    <script src="jg.js"></script>
  </div>
</body>
</html>
